name: Continuous Integration and Delivery with Github Actions

on:
  push:
    branches:
      - "main"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compila o projeto sem rodar testes ainda
      - name: Build Application .jar
        working-directory: .
        run: mvn clean package -DskipTests

      # Sobe serviços auxiliares (ex: banco de dados) se necessário
      - name: Start services
        working-directory: .
        run: docker compose up -d

      # Sobe a aplicação em background na porta definida
      - name: Start Application in Background
        run: mvn spring-boot:run -Dspring-boot.run.profiles=test &

      # Executa os testes de integração (agora com servidor ativo)
      - name: Run Integration Tests
        run: mvn verify

      - name: Docker Compose Build
        working-directory: .
        run: docker compose build

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:${{ github.run_id }}
          
          docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:${{ github.run_id }}