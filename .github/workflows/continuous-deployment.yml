# Define o nome do workflow para identificação no GitHub Actions
name: Continuous Integration and Delivery with Github Actions

# Especifica os eventos que acionam o workflow: push na branch main
on:
  push:
    branches:
      - "main"

# Define os jobs do workflow
jobs:
  # Job principal para build e teste
  build-and-test:
    # Executa no sistema operacional Ubuntu mais recente
    runs-on: ubuntu-latest

    # Lista de passos a serem executados no job
    steps:
      # Faz checkout do código do repositório
      - uses: actions/checkout@v4

      # Faz login no Docker Hub usando credenciais secretas
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # Configura credenciais da AWS para acesso aos serviços
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:  ${{ secrets.AWS_DEFAULT_REGION }}

      # Faz login no Amazon ECR (Elastic Container Registry)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Configura o Java 21 (Temurin) e habilita cache do Maven
      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compila o projeto sem rodar testes ainda
      - name: Build Application .jar
        working-directory: .
        run: mvn clean package -DskipTests

      # Sobe serviços auxiliares (ex: banco de dados) se necessário
      - name: Start services
        working-directory: .
        run: docker compose up -d

      # Sobe a aplicação em background na porta definida
      - name: Start Application in Background
        run: mvn spring-boot:run -Dspring-boot.run.profiles=test &

      # Executa os testes de integração (agora com servidor ativo)
      - name: Run Integration Tests
        run: mvn verify

      # Constrói as imagens Docker via Docker Compose
      - name: Docker Compose Build
        working-directory: .
        run: docker compose build

      # Marca e envia a imagem Docker para o Amazon ECR
      - name: Tag and Push Docker Image to Amazon Container Registry - ECR
        run: |
          # Marca a imagem local com a tag latest para o ECR
          docker tag ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest ${{ secrets.IMAGE_REPO_URL }}:latest  
          # Marca a imagem local com a tag do ID do run para o ECR
          docker tag ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest ${{ secrets.IMAGE_REPO_URL }}:${{ github.run_id }}
          
          # Envia a imagem latest para o ECR
          docker push ${{ secrets.IMAGE_REPO_URL }}:latest
          # Envia a imagem com tag do run ID para o ECR
          docker push ${{ secrets.IMAGE_REPO_URL }}:${{ github.run_id }}

      # Envia a imagem Docker para o Docker Hub
      - name: Push to Docker Hub Container Registry
        run: |
          # Marca a imagem local com a tag do ID do run para o Docker Hub
          docker tag ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:${{ github.run_id }}
          
          # Envia a imagem latest para o Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:latest
          # Envia a imagem com tag do run ID para o Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot-erudio:${{ github.run_id }}